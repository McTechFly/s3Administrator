# =============================================================================
#  s3Administrator — GitLab CI/CD
# =============================================================================
#
#  Pipelines:
#   - on every commit:       lint + typecheck + build a Docker image
#   - on every tag v*.*.*:   publish the image to the GitLab Container
#                            Registry and create a GitLab Release with a
#                            self-contained install bundle attached.
#
#  How to cut a release:
#    git tag v1.0.0
#    git push origin v1.0.0
#
#  Nothing to configure on the GitLab side besides a running Runner that can
#  build Docker images (docker:dind) — GitLab provides $CI_REGISTRY_USER,
#  $CI_REGISTRY_PASSWORD and $CI_JOB_TOKEN out of the box.
# =============================================================================

stages:
  - test
  - build
  - release

variables:
  NODE_VERSION: "22"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  # Set to "true" to skip the test stage on tag pipelines and ship faster.
  SKIP_TESTS_ON_TAG: "false"
  # Ensure apt/npm can resolve quickly.
  GIT_DEPTH: "20"

default:
  tags:
    - docker

# -----------------------------------------------------------------------------
# Test stage — lint + typecheck. No unit tests yet; add them here when ready.
# -----------------------------------------------------------------------------
.node-base:
  image: node:${NODE_VERSION}-alpine
  before_script:
    - apk add --no-cache libc6-compat openssl
    - npm ci --prefer-offline --no-audit --no-fund
    - npx prisma generate
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/
    policy: pull-push

typecheck:
  extends: .node-base
  stage: test
  script:
    - npx tsc --noEmit
  rules:
    - if: '$CI_COMMIT_TAG && $SKIP_TESTS_ON_TAG == "true"'
      when: never
    - when: on_success

# -----------------------------------------------------------------------------
# Build stage — build & push a Docker image to the GitLab registry.
# -----------------------------------------------------------------------------
build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    # Always push a :sha tag so commit pipelines can test the image.
    - docker build
        --file docker/Dockerfile
        --build-arg ENVIRONMENT=COMMUNITY
        --build-arg NEXT_PUBLIC_EDITION=community
        --tag "$IMAGE_NAME:$IMAGE_TAG"
        .
    - docker push "$IMAGE_NAME:$IMAGE_TAG"
    # On tag builds also push :<tag> and :latest.
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$IMAGE_NAME:$IMAGE_TAG" "$IMAGE_NAME:$CI_COMMIT_TAG"
        docker tag "$IMAGE_NAME:$IMAGE_TAG" "$IMAGE_NAME:latest"
        docker push "$IMAGE_NAME:$CI_COMMIT_TAG"
        docker push "$IMAGE_NAME:latest"
      fi
  rules:
    - if: "$CI_COMMIT_TAG"
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
    - if: "$CI_PIPELINE_SOURCE == 'merge_request_event'"
      when: manual
      allow_failure: true

# -----------------------------------------------------------------------------
# Release stage — only on tags vX.Y.Z. Produces a ready-to-run bundle and
# attaches it to a GitLab Release using the `release` keyword.
# -----------------------------------------------------------------------------
package-bundle:
  stage: release
  image: alpine:3.20
  needs: ["build-image"]
  before_script:
    - apk add --no-cache zip
  script:
    - mkdir -p release/s3administrator-$CI_COMMIT_TAG
    - cp docker-compose.release.yml release/s3administrator-$CI_COMMIT_TAG/docker-compose.yml
    - cp docker-compose.cluster.yml release/s3administrator-$CI_COMMIT_TAG/docker-compose.cluster.yml
    - mkdir -p release/s3administrator-$CI_COMMIT_TAG/docker
    - cp docker/Caddyfile.cluster release/s3administrator-$CI_COMMIT_TAG/docker/Caddyfile.cluster
    - cp .env.example release/s3administrator-$CI_COMMIT_TAG/.env.example
    - cp README.md release/s3administrator-$CI_COMMIT_TAG/ 2>/dev/null || true
    - cp LICENSE release/s3administrator-$CI_COMMIT_TAG/ 2>/dev/null || true
    - echo "APP_IMAGE=$IMAGE_NAME:$CI_COMMIT_TAG" > release/s3administrator-$CI_COMMIT_TAG/image.env
    - (cd release && zip -r s3administrator-$CI_COMMIT_TAG.zip s3administrator-$CI_COMMIT_TAG)
    - (cd release && tar -czf s3administrator-$CI_COMMIT_TAG.tar.gz s3administrator-$CI_COMMIT_TAG)
  artifacts:
    paths:
      - release/s3administrator-$CI_COMMIT_TAG.zip
      - release/s3administrator-$CI_COMMIT_TAG.tar.gz
    expire_in: never
  rules:
    - if: "$CI_COMMIT_TAG =~ /^v\\d+\\.\\d+\\.\\d+$/"

create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-image
    - job: package-bundle
      artifacts: true
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "s3Administrator $CI_COMMIT_TAG"
    description: |
      Self-hosted release of s3Administrator.

      **Docker image:** `$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG`

      ## Quick install

      1. Download and extract `s3administrator-$CI_COMMIT_TAG.tar.gz`
      2. `cp .env.example .env` and fill in the REQUIRED values
         (`AUTH_SECRET`, `ENCRYPTION_MASTER_KEY`, `ENCRYPTION_SALT`,
         `POSTGRES_PASSWORD`)
      3. `docker compose up -d`
      4. Open http://localhost:3000 and register the first admin user

      On first start the app automatically creates the database and
      applies the schema. No manual migration step is required.
    assets:
      links:
        - name: "Install bundle (tar.gz)"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/release/s3administrator-${CI_COMMIT_TAG}.tar.gz"
          link_type: package
        - name: "Install bundle (zip)"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/release/s3administrator-${CI_COMMIT_TAG}.zip"
          link_type: package
        - name: "Docker image"
          url: "${CI_PROJECT_URL}/container_registry"
          link_type: image
  rules:
    - if: "$CI_COMMIT_TAG =~ /^v\\d+\\.\\d+\\.\\d+$/"
