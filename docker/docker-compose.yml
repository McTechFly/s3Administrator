services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ENVIRONMENT: ${ENVIRONMENT:-COMMUNITY}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
        ENABLE_ACTION_TRACKING: ${ENABLE_ACTION_TRACKING:-true}
        NPM_TOKEN: ${NPM_TOKEN:-}
        NEXT_PUBLIC_EDITION: ${NEXT_PUBLIC_EDITION:-community}
    ports:
      - "3000:3000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-COMMUNITY}
      - DATABASE_URL=${DATABASE_URL_DOCKER:-postgresql://s3admin:${POSTGRES_PASSWORD}@db:5432/s3_admin}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL:-http://localhost}
      - NEXT_PUBLIC_GA_MEASUREMENT_ID=${NEXT_PUBLIC_GA_MEASUREMENT_ID}
      - ENABLE_ACTION_TRACKING=${ENABLE_ACTION_TRACKING:-true}
      - NEXT_PUBLIC_EDITION=${NEXT_PUBLIC_EDITION:-community}
      # OAuth
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY}
      - ENCRYPTION_SALT=${ENCRYPTION_SALT}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - SYSTEM_LOG_FILE_PATH=${SYSTEM_LOG_FILE_PATH:-/app/logs/system.log}
      - SERVER_METRICS_ENABLED=${SERVER_METRICS_ENABLED:-true}
      - SERVER_METRICS_INTERVAL_SECONDS=${SERVER_METRICS_INTERVAL_SECONDS:-60}
      - SERVER_METRICS_RETENTION_DAYS=${SERVER_METRICS_RETENTION_DAYS:-7}
      - SERVER_METRICS_NODE_EXPORTER_URL=${SERVER_METRICS_NODE_EXPORTER_URL:-http://node-exporter:9100/metrics}
      - THUMBNAIL_GENERATION_ENABLED=${THUMBNAIL_GENERATION_ENABLED:-true}
      - THUMBNAIL_MAX_WIDTH=${THUMBNAIL_MAX_WIDTH:-480}
      - TASK_ENGINE_V2=${TASK_ENGINE_V2:-true}
      - TASK_ENGINE_INTERNAL_TOKEN=${TASK_ENGINE_INTERNAL_TOKEN:-local-task-engine-token}
      - TASK_EVENT_RETENTION_DAYS=${TASK_EVENT_RETENTION_DAYS:-90}
      - TASK_WORKER_SCAN_INTERVAL_SECONDS=${TASK_WORKER_SCAN_INTERVAL_SECONDS:-10}
      - TASK_WORKER_CONCURRENCY=${TASK_WORKER_CONCURRENCY:-8}
      - TASK_MAX_ACTIVE_PER_USER=${TASK_MAX_ACTIVE_PER_USER:-4}
      - TASK_WORKER_PER_USER_PARALLELISM=${TASK_WORKER_PER_USER_PARALLELISM:-4}
      - TASK_WORKER_USER_BURST=${TASK_WORKER_USER_BURST:-4}
      - TASK_WORKER_USER_BUDGET_MS=${TASK_WORKER_USER_BUDGET_MS:-20000}
      - TASK_TRANSFER_ITEM_CONCURRENCY=${TASK_TRANSFER_ITEM_CONCURRENCY:-4}
      - TASK_TRANSFER_BATCH_SIZE=${TASK_TRANSFER_BATCH_SIZE:-100}
      - TASK_TRANSFER_MULTIPART_COPY_PART_CONCURRENCY=${TASK_TRANSFER_MULTIPART_COPY_PART_CONCURRENCY:-4}
      - TASK_TRANSFER_RELAY_QUEUE_SIZE=${TASK_TRANSFER_RELAY_QUEUE_SIZE:-2}
      - TASK_TRANSFER_RELAY_PART_SIZE_MB=${TASK_TRANSFER_RELAY_PART_SIZE_MB:-16}
      - TASK_TRANSFER_PREFER_SERVER_COPY_SAME_BACKEND=${TASK_TRANSFER_PREFER_SERVER_COPY_SAME_BACKEND:-true}
      - TASK_TRANSFER_ITEM_RETRY_MAX_ATTEMPTS=${TASK_TRANSFER_ITEM_RETRY_MAX_ATTEMPTS:-3}
      - TASK_TRANSFER_ITEM_RETRY_BASE_DELAY_MS=${TASK_TRANSFER_ITEM_RETRY_BASE_DELAY_MS:-1000}
      - TASK_TRANSFER_VERIFY_CHECKSUM=${TASK_TRANSFER_VERIFY_CHECKSUM:-true}
      - TASK_TRANSFER_BANDWIDTH_LIMIT_MBPS=${TASK_TRANSFER_BANDWIDTH_LIMIT_MBPS:-0}
      - TASK_TRANSFER_PARALLEL_DOWNLOAD_THRESHOLD_MB=${TASK_TRANSFER_PARALLEL_DOWNLOAD_THRESHOLD_MB:-512}
      - TASK_TRANSFER_PARALLEL_DOWNLOAD_STREAMS=${TASK_TRANSFER_PARALLEL_DOWNLOAD_STREAMS:-2}
      - TASK_BULK_DELETE_BATCH_SIZE=${TASK_BULK_DELETE_BATCH_SIZE:-1000}
      # Demo
      - DEMO_S3_ACCESS_KEY=${DEMO_S3_ACCESS_KEY:-}
      - DEMO_S3_SECRET_KEY=${DEMO_S3_SECRET_KEY:-}
      - DEMO_S3_ENDPOINT=${DEMO_S3_ENDPOINT:-}
      - DEMO_S3_REGION=${DEMO_S3_REGION:-}
      - DEMO_S3_PROVIDER=${DEMO_S3_PROVIDER:-}
      - DEMO_S3_LABEL=${DEMO_S3_LABEL:-}
    volumes:
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      node-exporter:
        condition: service_started
    restart: unless-stopped

  worker:
    image: ${COMPOSE_PROJECT_NAME:-s3admin}-tools
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: tools
      args:
        ENVIRONMENT: ${ENVIRONMENT:-COMMUNITY}
        NPM_TOKEN: ${NPM_TOKEN:-}
    command: ["npx", "tsx", "src/worker/task-worker.ts"]
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-COMMUNITY}
      - DATABASE_URL=${DATABASE_URL_DOCKER:-postgresql://s3admin:${POSTGRES_PASSWORD}@db:5432/s3_admin}
      - NEXT_PUBLIC_EDITION=${NEXT_PUBLIC_EDITION:-community}
      - TASK_ENGINE_V2=${TASK_ENGINE_V2:-true}
      - TASK_ENGINE_INTERNAL_TOKEN=${TASK_ENGINE_INTERNAL_TOKEN:-local-task-engine-token}
      - TASK_ENGINE_APP_URL=${TASK_ENGINE_APP_URL:-http://app:3000}
      - TASK_EVENT_RETENTION_DAYS=${TASK_EVENT_RETENTION_DAYS:-90}
      - TASK_WORKER_SCAN_INTERVAL_SECONDS=${TASK_WORKER_SCAN_INTERVAL_SECONDS:-10}
      - TASK_WORKER_CONCURRENCY=${TASK_WORKER_CONCURRENCY:-8}
      - TASK_MAX_ACTIVE_PER_USER=${TASK_MAX_ACTIVE_PER_USER:-4}
      - TASK_WORKER_PER_USER_PARALLELISM=${TASK_WORKER_PER_USER_PARALLELISM:-4}
      - TASK_WORKER_USER_BURST=${TASK_WORKER_USER_BURST:-4}
      - TASK_WORKER_USER_BUDGET_MS=${TASK_WORKER_USER_BUDGET_MS:-20000}
      - TASK_TRANSFER_ITEM_CONCURRENCY=${TASK_TRANSFER_ITEM_CONCURRENCY:-4}
      - TASK_TRANSFER_BATCH_SIZE=${TASK_TRANSFER_BATCH_SIZE:-100}
      - TASK_TRANSFER_MULTIPART_COPY_PART_CONCURRENCY=${TASK_TRANSFER_MULTIPART_COPY_PART_CONCURRENCY:-4}
      - TASK_TRANSFER_RELAY_QUEUE_SIZE=${TASK_TRANSFER_RELAY_QUEUE_SIZE:-2}
      - TASK_TRANSFER_RELAY_PART_SIZE_MB=${TASK_TRANSFER_RELAY_PART_SIZE_MB:-16}
      - TASK_TRANSFER_PREFER_SERVER_COPY_SAME_BACKEND=${TASK_TRANSFER_PREFER_SERVER_COPY_SAME_BACKEND:-true}
      - TASK_TRANSFER_ITEM_RETRY_MAX_ATTEMPTS=${TASK_TRANSFER_ITEM_RETRY_MAX_ATTEMPTS:-3}
      - TASK_TRANSFER_ITEM_RETRY_BASE_DELAY_MS=${TASK_TRANSFER_ITEM_RETRY_BASE_DELAY_MS:-1000}
      - TASK_TRANSFER_VERIFY_CHECKSUM=${TASK_TRANSFER_VERIFY_CHECKSUM:-true}
      - TASK_TRANSFER_BANDWIDTH_LIMIT_MBPS=${TASK_TRANSFER_BANDWIDTH_LIMIT_MBPS:-0}
      - TASK_TRANSFER_PARALLEL_DOWNLOAD_THRESHOLD_MB=${TASK_TRANSFER_PARALLEL_DOWNLOAD_THRESHOLD_MB:-512}
      - TASK_TRANSFER_PARALLEL_DOWNLOAD_STREAMS=${TASK_TRANSFER_PARALLEL_DOWNLOAD_STREAMS:-2}
      - TASK_BULK_DELETE_BATCH_SIZE=${TASK_BULK_DELETE_BATCH_SIZE:-1000}
      - BACKUP_S3_ENDPOINT=${BACKUP_S3_ENDPOINT:-}
      - BACKUP_S3_ACCESS_KEY=${BACKUP_S3_ACCESS_KEY:-}
      - BACKUP_S3_SECRET_KEY=${BACKUP_S3_SECRET_KEY:-}
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - BACKUP_SCHEDULE_CRON=${BACKUP_SCHEDULE_CRON:-0 */3 * * *}
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

  tools:
    image: ${COMPOSE_PROJECT_NAME:-s3admin}-tools
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: tools
      args:
        ENVIRONMENT: ${ENVIRONMENT:-COMMUNITY}
        NPM_TOKEN: ${NPM_TOKEN:-}
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-COMMUNITY}
      - DATABASE_URL=${DATABASE_URL_DOCKER:-postgresql://s3admin:${POSTGRES_PASSWORD}@db:5432/s3_admin}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_SECRET_KEY_COMMUNITY=${STRIPE_SECRET_KEY_COMMUNITY:-}
      - STRIPE_SECRET_KEY_CLOUD=${STRIPE_SECRET_KEY_CLOUD:-}
    depends_on:
      db:
        condition: service_healthy

  proxy:
    image: caddy:2.11.1-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ROOT_DOMAIN=${ROOT_DOMAIN:-localhost}
      - CADDY_SITE_ADDRESSES=${CADDY_SITE_ADDRESSES:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.10.2
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
    volumes:
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    restart: unless-stopped

  db:
    image: postgres:17
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=s3admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=s3_admin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U s3admin -d s3_admin"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  app_logs:
