services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ENVIRONMENT: ${ENVIRONMENT:-COMMUNITY}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
        ENABLE_ACTION_TRACKING: ${ENABLE_ACTION_TRACKING:-true}
        NPM_TOKEN: ${NPM_TOKEN:-}
        NEXT_PUBLIC_EDITION: ${NEXT_PUBLIC_EDITION:-community}
    ports:
      - "3000:3000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-COMMUNITY}
      - DATABASE_URL=${DATABASE_URL_DOCKER:-postgresql://s3admin:${POSTGRES_PASSWORD}@db:5432/s3_admin}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL:-http://localhost}
      - NEXT_PUBLIC_GA_MEASUREMENT_ID=${NEXT_PUBLIC_GA_MEASUREMENT_ID}
      - ENABLE_ACTION_TRACKING=${ENABLE_ACTION_TRACKING:-true}
      - NEXT_PUBLIC_EDITION=${NEXT_PUBLIC_EDITION:-community}
      # OAuth
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY}
      - ENCRYPTION_SALT=${ENCRYPTION_SALT}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - SYSTEM_LOG_FILE_PATH=${SYSTEM_LOG_FILE_PATH:-/app/logs/system.log}
      - SERVER_METRICS_ENABLED=${SERVER_METRICS_ENABLED:-true}
      - SERVER_METRICS_INTERVAL_SECONDS=${SERVER_METRICS_INTERVAL_SECONDS:-60}
      - SERVER_METRICS_RETENTION_DAYS=${SERVER_METRICS_RETENTION_DAYS:-7}
      - SERVER_METRICS_NODE_EXPORTER_URL=${SERVER_METRICS_NODE_EXPORTER_URL:-http://node-exporter:9100/metrics}
      - THUMBNAIL_GENERATION_ENABLED=${THUMBNAIL_GENERATION_ENABLED:-true}
      - THUMBNAIL_MAX_WIDTH=${THUMBNAIL_MAX_WIDTH:-480}
      - TASK_ENGINE_V2=${TASK_ENGINE_V2:-true}
      - TASK_ENGINE_INTERNAL_TOKEN=${TASK_ENGINE_INTERNAL_TOKEN:-local-task-engine-token}
      - TASK_EVENT_RETENTION_DAYS=${TASK_EVENT_RETENTION_DAYS:-90}
    volumes:
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      node-exporter:
        condition: service_started
    restart: unless-stopped

  worker:
    image: ${COMPOSE_PROJECT_NAME:-s3admin}-tools
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: tools
      args:
        ENVIRONMENT: ${ENVIRONMENT:-COMMUNITY}
        NPM_TOKEN: ${NPM_TOKEN:-}
    command: ["npx", "tsx", "src/worker/task-worker.ts"]
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-COMMUNITY}
      - DATABASE_URL=${DATABASE_URL_DOCKER:-postgresql://s3admin:${POSTGRES_PASSWORD}@db:5432/s3_admin}
      - NEXT_PUBLIC_EDITION=${NEXT_PUBLIC_EDITION:-community}
      - TASK_ENGINE_V2=${TASK_ENGINE_V2:-true}
      - TASK_ENGINE_INTERNAL_TOKEN=${TASK_ENGINE_INTERNAL_TOKEN:-local-task-engine-token}
      - TASK_ENGINE_APP_URL=${TASK_ENGINE_APP_URL:-http://app:3000}
      - TASK_EVENT_RETENTION_DAYS=${TASK_EVENT_RETENTION_DAYS:-90}
      - BACKUP_S3_ENDPOINT=${BACKUP_S3_ENDPOINT:-}
      - BACKUP_S3_ACCESS_KEY=${BACKUP_S3_ACCESS_KEY:-}
      - BACKUP_S3_SECRET_KEY=${BACKUP_S3_SECRET_KEY:-}
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - BACKUP_SCHEDULE_CRON=${BACKUP_SCHEDULE_CRON:-0 */3 * * *}
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

  tools:
    image: ${COMPOSE_PROJECT_NAME:-s3admin}-tools
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: tools
      args:
        ENVIRONMENT: ${ENVIRONMENT:-COMMUNITY}
        NPM_TOKEN: ${NPM_TOKEN:-}
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-COMMUNITY}
      - DATABASE_URL=${DATABASE_URL_DOCKER:-postgresql://s3admin:${POSTGRES_PASSWORD}@db:5432/s3_admin}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_SECRET_KEY_COMMUNITY=${STRIPE_SECRET_KEY_COMMUNITY:-}
      - STRIPE_SECRET_KEY_CLOUD=${STRIPE_SECRET_KEY_CLOUD:-}
    depends_on:
      db:
        condition: service_healthy

  proxy:
    image: caddy:2.10-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ROOT_DOMAIN=${ROOT_DOMAIN:-localhost}
      - CADDY_SITE_ADDRESSES=${CADDY_SITE_ADDRESSES:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.9.1
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
    volumes:
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    restart: unless-stopped

  db:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=s3admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=s3_admin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U s3admin -d s3_admin"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  app_logs:
